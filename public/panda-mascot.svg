  <circle cx="60" cy="60" r="35" fill="currentColor" opacity="0.1" stroke="currentColor" stroke-width="2"/>

  <!-- 左耳 -->
  <circle cx="40" cy="35" r="12" fill="currentColor" opacity="0.8"/>

  <!-- 右耳 -->
  <circle cx="80" cy="35" r="12" fill="currentColor" opacity="0.8"/>

  <!-- 左眼 -->
  <ellipse cx="48" cy="55" rx="8" ry="10" fill="currentColor" opacity="0.8"/>
